<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <title>Cesium 3D Harita - MapServer Doğrudan Bağlantı</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #000;
    }
  </style>
</head>
<body>

  <div id="cesiumContainer"></div>

  <script>
    Cesium.Ion.defaultAccessToken = ''; // Lokal mod aktif

    // 1. Cesium Küresini başlatıyoruz (Başlangıçtaki varsayılan online katmanı sıfırlamak için boş bırakıyoruz)
    const viewer = new Cesium.Viewer('cesiumContainer', {
      baseLayerPicker: false,
      geocoder: false,
      homeButton: true,
      sceneModePicker: true,
      navigationHelpButton: false,
      animation: false,
      timeline: false
    });

    // 2. MapServer'ın ürettiği tek parça resmi doğrudan küreye giydiriyoruz
    // Yeni Docker düzenimize göre URL'i, portu (8080), mapfile yolunu ve katman adını (dunya_altlik) güncelledik.
    const dogrudanResimKatmani = new Cesium.SingleTileImageryProvider({
      url: 'http://localhost:8080/?map=/etc/mapserver/harita.map&SERVICE=WMS&VERSION=1.3.0&REQUEST=GetMap&LAYERS=dunya_altlik&STYLES=&CRS=EPSG:4326&BBOX=-90,-180,90,180&WIDTH=2048&HEIGHT=1024&FORMAT=image/png',
      rectangle: Cesium.Rectangle.fromDegrees(-180, -90, 180, 90) // Resmi tüm dünyaya yayar
    });

    // Katmanı sahnenin ana altlığı olarak ekle
    viewer.imageryLayers.addImageryProvider(dogrudanResimKatmani);

    // Kamerayı dünyayı görecek şekilde ayarla
    viewer.camera.setView({
      destination: Cesium.Rectangle.fromDegrees(-180, -90, 180, 90)
    });
  </script>
</body>
</html>
