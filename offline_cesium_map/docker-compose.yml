version: '3.8'

services:
  mapserver:
    image: camptocamp/mapserver:7.6
    ports:
      - "8080:80"
    volumes:
      - ./mapserver:/etc/mapserver
      - ./data:/data
    environment:
      - MS_MAPFILE=/etc/mapserver/harita.map
      - MS_CORS_ENABLED=true
    restart: always

  # Arayüzü yayınlamak için Nginx web sunucusu ekliyoruz:
  web_arayuz:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf # <-- BU SATIRI EKLEYEREK NGINX AYARINI İÇERİ VERDİK
    restart: always