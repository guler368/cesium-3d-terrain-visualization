version: '3.8'

services:
  mapserver:
    image: camptocamp/mapserver:7.6
    ports:
      - "8080:80"
    volumes:
      - ./volumes:/etc/mapserver
    environment:
      - MS_MAPFILE=/etc/mapserver/mapfiles/harita.map
      - MS_CORS_ENABLED=true
    restart: always

  web_arayuz:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./volumes/data:/data
    restart: always