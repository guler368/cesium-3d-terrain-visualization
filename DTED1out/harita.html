<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <title>Cesium 3D Canlı Harita - OSM + Gerçek Kabartma</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cesium/1.110.0/Cesium.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/cesium/1.110.0/Widgets/widgets.css" rel="stylesheet">
  <style>
    html, body, #cesiumContainer { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #000; }
  </style>
</head>
<body>

  <div id="cesiumContainer"></div>

  <script>
    // osm provider
    const osmProvider = new Cesium.UrlTemplateImageryProvider({
        url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        subdomains: ['a', 'b', 'c']
    });

    const viewer = new Cesium.Viewer('cesiumContainer', {
      baseLayer: new Cesium.ImageryLayer(osmProvider), 
      baseLayerPicker: false, 
      geocoder: false, 
      homeButton: true, 
      sceneModePicker: false, 
      navigationHelpButton: false, 
      animation: false, 
      timeline: false,
      shadows: false
    });

    //format yetenekleri
    // backend request

    // 🎯 3. ARAZİ KABARTMASI İÇİN TÜRKİYE SINIR KUTUSU (BBOX)
    const turkeyBounds = Cesium.Rectangle.fromDegrees(26.0, 35.5, 45.0, 42.5);

    Cesium.CesiumTerrainProvider.fromUrl('http://localhost:8080/arazi_mesh/', {
        requestVertexNormals: true, // Dağ yamaçlarındaki ışık bükülmesi için KRİTİK!
        requestWaterMask: false,
        tms: true,
        rectangle: turkeyBounds // 3D yükselti sadece Türkiye içinde çalışır
    }).then(function(provider) {
        viewer.terrainProvider = provider;
    });

    viewer.scene.globe.enableLighting = true; 
    viewer.scene.globe.depthTestAgainstTerrain = true; 
    
    // arazinin daha canlı görünmesi için dikey abartma (vertical exaggeration)
    viewer.scene.verticalExaggeration = 4.0; 

    // Derinlik ve vadi hissi veren dinamik fener ışığı
    viewer.scene.light = new Cesium.DirectionalLight({
        direction: new Cesium.Cartesian3(0.6, -0.6, -0.4) 
    });

    viewer.scene.screenSpaceCameraController.minimumZoomDistance = 50.0;
    viewer.scene.screenSpaceCameraController.enableCollisionDetection = true; 

    viewer.camera.setView({
        destination: Cesium.Cartesian3.fromDegrees(30.4900,36.3413, 1500.0),
        orientation: {
            heading: Cesium.Math.toRadians(0.0), 
            pitch: Cesium.Math.toRadians(-25.0), 
            roll: 0.0
        }
    });
  </script>
</body>
</html>
