<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <title>Cesium 3D Canlı Harita - OSM + Gerçek Kabartma</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cesium/1.110.0/Cesium.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/cesium/1.110.0/Widgets/widgets.css" rel="stylesheet">
  <style>
    html, body, #cesiumContainer { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #000; }
    
    /* 🎯 CESIUM ION YAZISIYLA ÇAKIŞMAYAN, SOL ALTA YAPIŞIK PANEL */
    #coordinate-panel {
      position: absolute;
      bottom: 30px; /* Cesium telif yazısının (Cesium ion) hemen üzerine yapışması için yükseltildi */
      left: 10px;
      background: rgba(20, 24, 30, 0.85); /* Askeri koyu yarı saydam arka plan */
      color: #00ff66; /* Dijital radar yeşili */
      font-family: 'Courier New', Courier, monospace; /* Rakamların titrememesi için sabit genişlikli font */
      padding: 10px 15px;
      border-radius: 4px;
      border: 1px solid #00ff66;
      font-size: 13px;
      line-height: 1.4;
      z-index: 999;
      pointer-events: none; /* Mouse tıklamalarını engellemez, altındaki küre hareket ettirilebilir */
      box-shadow: 0 0 15px rgba(0, 255, 102, 0.2);
    }
    .coord-label { color: #88a090; font-size: 11px; }
  </style>
</head>
<body>

  <div id="coordinate-panel">
    <div><span class="coord-label">LAT :</span> <span id="lat-val">0.000000°</span></div>
    <div><span class="coord-label">LON :</span> <span id="lon-val">0.000000°</span></div>
    <div><span class="coord-label">HGT :</span> <span id="height-val">0.0 m</span></div>
  </div>

  <div id="cesiumContainer"></div>

  <script>
    // osm provider
    const osmProvider = new Cesium.UrlTemplateImageryProvider({
        url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        subdomains: ['a', 'b', 'c']
    });

    const viewer = new Cesium.Viewer('cesiumContainer', {
      baseLayer: new Cesium.ImageryLayer(osmProvider), 
      baseLayerPicker: false, 
      geocoder: false, 
      homeButton: true, 
      sceneModePicker: false, 
      navigationHelpButton: false, 
      animation: false, 
      timeline: false,
      shadows: false,
      scene3DOnly: true
    });

    //format yetenekleri
    // backend request

    // 🎯 3. ARAZİ KABARTMASI İÇİN TÜRKİYE SINIR KUTUSU (BBOX)
    const turkeyBounds = Cesium.Rectangle.fromDegrees(26.0, 35.5, 45.0, 42.5);

    Cesium.CesiumTerrainProvider.fromUrl('http://localhost:8080/arazi_mesh/', {
        requestVertexNormals: true, // Dağ yamaçlarındaki ışık bükülmesi için KRİTİK!
        requestWaterMask: false,
        tms: true,
        rectangle: turkeyBounds // 3D yükselti sadece Türkiye içinde çalışır
    }).then(function(provider) {
        viewer.terrainProvider = provider;
    });

    viewer.scene.globe.enableLighting = true; 
    viewer.scene.globe.depthTestAgainstTerrain = true; 
    
    // arazinin daha canlı görünmesi için dikey abartma (vertical exaggeration)
    viewer.scene.verticalExaggeration = 1.0; 

    // Derinlik ve vadi hissi veren dinamik fener ışığı
    viewer.scene.light = new Cesium.DirectionalLight({
        direction: new Cesium.Cartesian3(0.6, -0.6, -0.4) 
    });

    viewer.scene.screenSpaceCameraController.minimumZoomDistance = 50.0;
    viewer.scene.screenSpaceCameraController.enableCollisionDetection = true; 

    viewer.camera.setView({
        destination: Cesium.Cartesian3.fromDegrees(30.4900,36.3413, 1500.0),
        orientation: {
            heading: Cesium.Math.toRadians(0.0), 
            pitch: Cesium.Math.toRadians(-25.0), 
            roll: 0.0
        }
    });

    // 🎯 ANLIK KOORDİNAT YAKALAMA VE FOOTER GÜNCELLEME MEKANİZMASI
    const latEl = document.getElementById('lat-val');
    const lonEl = document.getElementById('lon-val');
    const heightEl = document.getElementById('height-val');

    const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
    
    handler.setInputAction(function(movement) {
        const ray = viewer.camera.getPickRay(movement.endPosition);
        const cartesian = viewer.scene.globe.pick(ray, viewer.scene);
        
        if (Cesium.defined(cartesian)) {
            const cartographic = Cesium.Cartographic.fromCartesian(cartesian);
            
            const latitudeString = Cesium.Math.toDegrees(cartographic.latitude).toFixed(6);
            const longitudeString = Cesium.Math.toDegrees(cartographic.longitude).toFixed(6);
            const heightString = cartographic.height.toFixed(1);
            
            latEl.textContent = latitudeString + "°";
            lonEl.textContent = longitudeString + "°";
            heightEl.textContent = heightString + " m";
        }
    }, Cesium.ScreenSpaceEventType.MOUSE_MOVE);

  </script>
</body>
</html>
